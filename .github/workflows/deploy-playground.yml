name: Deploy Playground

on:
  push:
    branches:
      - main
    paths:
      - 'public/**'
      - 'playground/**'
      - 'src/**'
      - 'webpack-dev.config.js'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build

      - name: Prepare playground site
        run: |
          mkdir -p _site
          cp public/index.html _site/
          cp playground/playground.js _site/
          cp dist/umd/siteview-sdk.min.js _site/siteview-sdk.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
